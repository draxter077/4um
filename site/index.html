<!DOCTYPE html>

<html lang="pt-br" role="main">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="Dashboard com informações dos fundos de investimentos brasileiros e negociações de títulos públicos, 
        baseado nas fontes de dados da CVM e ANBIMA">

        <title>4UM - Dashboard</title>
        <link rel="icon" type="image/x-icon" href="./assets/icon.png">

        <!-- Google tag (gtag.js) -->
        </script>

        <style>
            #root{
                transition:all 0.5s;
            }
            #loading{
                position:fixed;
                top:0%;
                left:0%;
                z-index:10;
                display:flex;
                flex-direction:column;
                align-items:center;
                justify-content:center;
                background:rgb(0,0,0);
                width:100%;
                height:100%;
                transition:opacity 1s;
            }
            #loading>div{
                width:5%;
                height:5%;
                background:rgb(140,198,63);
                border-radius:50px;
                transform:translateX(-100%);
                animation:loading 2s linear 0s infinite alternate;
            }
            @keyframes loading{
                0%{transform:translateX(-100%);width:5%}
                50%{transform:translateX(0%);width:2.5%}
                100%{transform:translateX(100%);width:5%}
            }
            @keyframes loading2{
                0%{transform:translateX(-100%);}
                50%{transform:translateX(0%);}
                100%{transform:translateX(100%);}
            }
            @keyframes taller{
                0%{max-height:0px;}
                100%{max-height:1000px;}
            }
        </style>
    </head>

    <body>
        <div id="loading"><div></div></div>
        <div id="root"></div>
        <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
        <script type="module" src="./main.js"></script>
    </body>
</html>
